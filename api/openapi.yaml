openapi: "3.0.3"
info:
  title: Claude Task App API
  version: "1.0.0"
  description: シンプルなタスク管理アプリの REST API

servers:
  - url: http://localhost:8080
    description: ローカル開発環境

paths:
  # ========== Users ==========
  /api/v1/users:
    post:
      summary: ユーザー登録
      operationId: createUser
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/users/{userId}:
    put:
      summary: ユーザー変更
      operationId: updateUser
      tags:
        - users
      parameters:
        - $ref: "#/components/parameters/UserId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: ユーザーが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ========== Tasks ==========
  /api/v1/tasks:
    post:
      summary: タスク登録
      operationId: createTask
      tags:
        - tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      summary: タスク一覧
      operationId: listTasks
      tags:
        - tasks
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaskResponse"

  /api/v1/tasks/{taskId}:
    get:
      summary: タスク詳細
      operationId: getTask
      tags:
        - tasks
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          description: タスクが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: タスク変更
      operationId: updateTask
      tags:
        - tasks
      parameters:
        - $ref: "#/components/parameters/TaskId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: タスクが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      summary: タスク削除
      operationId: deleteTask
      tags:
        - tasks
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "204":
          description: 削除成功
        "404":
          description: タスクが見つからない
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
        format: int64

    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: integer
        format: int64

  schemas:
    # ===== User =====
    CreateUserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: "山田太郎"
        email:
          type: string
          format: email
          example: "taro@example.com"

    UpdateUserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: "山田太郎"
        email:
          type: string
          format: email
          example: "taro@example.com"

    UserResponse:
      type: object
      required:
        - id
        - name
        - email
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    # ===== Task =====
    CreateTaskRequest:
      type: object
      required:
        - title
        - userId
      properties:
        title:
          type: string
          example: "買い物に行く"
        description:
          type: string
          example: "牛乳と卵を買う"
        status:
          $ref: "#/components/schemas/TaskStatus"
        userId:
          type: integer
          format: int64

    UpdateTaskRequest:
      type: object
      required:
        - title
        - userId
      properties:
        title:
          type: string
          example: "買い物に行く"
        description:
          type: string
          example: "牛乳と卵を買う"
        status:
          $ref: "#/components/schemas/TaskStatus"
        userId:
          type: integer
          format: int64

    TaskResponse:
      type: object
      required:
        - id
        - title
        - status
        - userId
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/TaskStatus"
        userId:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TaskStatus:
      type: string
      enum:
        - todo
        - in_progress
        - done
      default: todo

    # ===== Error =====
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: "validation error"
